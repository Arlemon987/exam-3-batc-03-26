<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asiqur's Blog | Exam-3 Preps</title>
    <!-- React and Babel -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .line-clamp-3 { display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
        .fade-in { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect } = React;

        const MANUAL_CONFIG = {
            apiKey: "AIzaSyCtySdj26DJT5Tb1Bv7LChYVnfU5hFe3Yg",
            authDomain: "prepforexam-7e365.firebaseapp.com",
            projectId: "prepforexam-7e365",
            storageBucket: "prepforexam-7e365.firebasestorage.app",
            messagingSenderId: "741904591926",
            appId: "1:741904591926:web:d7e799828b4d7500cbbc97",
        };

        let db, auth, appId;
        let isFirebaseReady = false;

        try {
            let config = {};
            if (typeof __firebase_config !== 'undefined' && __firebase_config) {
                config = JSON.parse(__firebase_config);
            } else if (MANUAL_CONFIG.apiKey) {
                config = MANUAL_CONFIG;
            }

            if (config.apiKey && typeof firebase !== 'undefined') {
                if (!firebase.apps.length) {
                    firebase.initializeApp(config);
                }
                db = firebase.firestore();
                auth = firebase.auth();
                appId = typeof __app_id !== 'undefined' ? __app_id : 'asiqur-blog';
                isFirebaseReady = true;
            }
        } catch (e) {
            console.error("Critical Firebase Init Error:", e);
        }

        const Icon = ({ name, size = 20, className = "" }) => {
            useEffect(() => { if (window.lucide) window.lucide.createIcons(); }, [name]);
            return <i data-lucide={name} style={{ width: size, height: size }} className={`inline-block ${className}`}></i>;
        };

        const ADMIN_ID = "Admin789";
        const ADMIN_PASS = "Admin987#";

        function App() {
            const [view, setView] = useState('home');
            const [blogs, setBlogs] = useState([]);
            const [user, setUser] = useState(null);
            const [isLoading, setIsLoading] = useState(true);
            const [loadError, setLoadError] = useState(null);
            const [selectedBlog, setSelectedBlog] = useState(null);
            const [selectedSubject, setSelectedSubject] = useState('All');
            const [isAdminMode, setIsAdminMode] = useState(false);
            
            const [loginId, setLoginId] = useState('');
            const [loginPass, setLoginPass] = useState('');
            const [error, setError] = useState('');
            
            // Post management state
            const [newPost, setNewPost] = useState({ 
                subject: '', 
                topic: '', 
                content: '',
                tableData: [] // Array of { key: '', value: '' }
            });
            const [editingId, setEditingId] = useState(null);

            // Auth Logic
            useEffect(() => {
                if (!isFirebaseReady) {
                    setIsLoading(false);
                    return;
                }
                const initAuth = async () => {
                    try {
                        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                            await auth.signInWithCustomToken(__initial_auth_token);
                        } else if (!auth.currentUser) {
                            await auth.signInAnonymously();
                        }
                    } catch (err) {
                        setLoadError("Authentication failed. Check your Firebase console settings.");
                        setIsLoading(false);
                    }
                };
                initAuth();
                const unsubscribe = auth.onAuthStateChanged((u) => {
                    setUser(u);
                    if (u) setLoadError(null);
                });
                return () => unsubscribe();
            }, []);

            // Data Sync
            useEffect(() => {
                if (!user || !isFirebaseReady) return;
                setIsLoading(true);
                const collectionRef = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('blogs');
                const unsubscribe = collectionRef.onSnapshot((snapshot) => {
                    const data = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    data.sort((a, b) => (b.createdAt || 0) - (a.createdAt || 0));
                    setBlogs(data);
                    setIsLoading(false);
                }, (err) => {
                    setLoadError("Firestore Connection Error.");
                    setIsLoading(false);
                });
                return () => unsubscribe();
            }, [user]);

            const subjects = useMemo(() => ['All', ...new Set(blogs.map(b => b.subject))], [blogs]);
            const filteredBlogs = useMemo(() => selectedSubject === 'All' ? blogs : blogs.filter(b => b.subject === selectedSubject), [blogs, selectedSubject]);

            const handleLogin = (e) => {
                e.preventDefault();
                if (loginId === ADMIN_ID && loginPass === ADMIN_PASS) {
                    setIsAdminMode(true);
                    setView('admin');
                    setError('');
                } else {
                    setError('Invalid Credentials');
                }
            };

            const handleAddTableRow = () => {
                setNewPost(prev => ({
                    ...prev,
                    tableData: [...(prev.tableData || []), { key: '', value: '' }]
                }));
            };

            const handleRemoveTableRow = (index) => {
                setNewPost(prev => ({
                    ...prev,
                    tableData: prev.tableData.filter((_, i) => i !== index)
                }));
            };

            const handleUpdateTableRow = (index, field, val) => {
                const updated = [...newPost.tableData];
                updated[index][field] = val;
                setNewPost(prev => ({ ...prev, tableData: updated }));
            };

            const handleSavePost = async (e) => {
                e.preventDefault();
                if (!newPost.subject || !newPost.topic || !newPost.content || !isFirebaseReady || !user) return;

                const collectionRef = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('blogs');

                try {
                    const payload = {
                        ...newPost,
                        updatedAt: Date.now()
                    };

                    if (editingId) {
                        await collectionRef.doc(editingId).update(payload);
                        setEditingId(null);
                    } else {
                        await collectionRef.add({
                            ...payload,
                            author: "Asiqur",
                            date: new Date().toLocaleDateString(),
                            createdAt: Date.now()
                        });
                    }
                    setNewPost({ subject: '', topic: '', content: '', tableData: [] });
                } catch (err) {
                    alert("Failed to save: " + err.message);
                }
            };

            const handleEditClick = (blog) => {
                setEditingId(blog.id);
                setNewPost({
                    subject: blog.subject,
                    topic: blog.topic,
                    content: blog.content,
                    tableData: blog.tableData || []
                });
            };

            const handleCancelEdit = () => {
                setEditingId(null);
                setNewPost({ subject: '', topic: '', content: '', tableData: [] });
            };

            const handleDeletePost = async (id) => {
                if (confirm('Delete this prep guide?') && isFirebaseReady) {
                    try {
                        const collectionRef = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('blogs');
                        await collectionRef.doc(id).delete();
                        if (editingId === id) handleCancelEdit();
                    } catch (err) {
                        console.error("Delete failed", err);
                    }
                }
            };

            if (!isFirebaseReady && !isLoading) {
                return (
                    <div className="min-h-screen flex items-center justify-center bg-slate-50 p-4 text-center">
                        <div className="bg-white p-8 rounded-2xl shadow-xl max-w-md">
                            <Icon name="alert-triangle" size={48} className="text-amber-500 mb-4" />
                            <h1 className="text-xl font-bold mb-2">Setup Required</h1>
                            <p className="text-slate-600">Please provide Firebase configuration in the source code.</p>
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen pb-20">
                    <nav className="bg-white border-b border-slate-200 sticky top-0 z-50 shadow-sm">
                        <div className="max-w-6xl mx-auto px-4 h-16 flex items-center justify-between">
                            <div className="flex items-center gap-2 cursor-pointer group" onClick={() => setView('home')}>
                                <div className="bg-indigo-600 p-2 rounded-lg text-white flex items-center justify-center">
                                    <Icon name="book-open" size={20} />
                                </div>
                                <span className="text-xl font-bold text-slate-800 tracking-tight">Asiqur's<span className="text-indigo-600">Blog</span></span>
                            </div>
                            <div>
                                {isAdminMode ? (
                                    <button onClick={() => { setIsAdminMode(false); setView('home'); }} className="text-sm font-medium text-red-600 px-3 py-2 flex items-center gap-1">
                                        <Icon name="log-out" size={16} /> Exit Admin
                                    </button>
                                ) : (
                                    <button onClick={() => setView('login')} className="text-sm font-medium text-slate-600 hover:text-indigo-600 flex items-center gap-1">
                                        <Icon name="shield-check" size={16} /> Admin
                                    </button>
                                )}
                            </div>
                        </div>
                    </nav>

                    <main className="max-w-6xl mx-auto px-4 py-8">
                        {isLoading ? (
                            <div className="flex flex-col items-center justify-center py-20">
                                <div className="w-12 h-12 border-4 border-indigo-600 border-t-transparent rounded-full animate-spin"></div>
                                <p className="mt-4 text-slate-400 font-medium">Syncing with cloud...</p>
                            </div>
                        ) : (
                            <>
                                {view === 'home' && (
                                    <div className="space-y-8 fade-in">
                                        <header className="text-center max-w-2xl mx-auto space-y-4">
                                            <h1 className="text-4xl font-extrabold text-slate-900 tracking-tight">Exam-3 Preps</h1>
                                            <p className="text-slate-500 text-lg font-medium">Cloud Database Connected</p>
                                        </header>
                                        
                                        {blogs.length > 0 && (
                                            <div className="flex flex-wrap gap-2 justify-center">
                                                {subjects.map(sub => (
                                                    <button key={sub} onClick={() => setSelectedSubject(sub)} className={`px-4 py-2 rounded-full text-sm font-medium transition-all ${selectedSubject === sub ? 'bg-indigo-600 text-white shadow-md' : 'bg-white text-slate-600 border border-slate-200 hover:bg-slate-50'}`}>
                                                        {sub}
                                                    </button>
                                                ))}
                                            </div>
                                        )}

                                        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                                            {filteredBlogs.map(blog => (
                                                <div key={blog.id} className="bg-white rounded-2xl border border-slate-200 overflow-hidden hover:shadow-xl transition-all flex flex-col h-full">
                                                    <div className="p-6 flex-grow">
                                                        <span className="inline-block px-3 py-1 bg-indigo-50 text-indigo-700 text-xs font-bold rounded mb-4 uppercase tracking-wider">{blog.subject}</span>
                                                        <h3 className="text-xl font-bold text-slate-800 mb-3 line-clamp-2">{blog.topic}</h3>
                                                        <p className="text-slate-600 text-sm leading-relaxed line-clamp-3">{blog.content}</p>
                                                    </div>
                                                    <div className="px-6 py-4 bg-slate-50 border-t border-slate-100 flex items-center justify-between">
                                                        <span className="text-xs text-slate-400 flex items-center gap-1"><Icon name="calendar" size={14} /> {blog.date}</span>
                                                        <button onClick={() => { setSelectedBlog(blog); setView('read'); }} className="text-indigo-600 text-sm font-bold flex items-center gap-1 hover:underline group">
                                                            Read More <Icon name="chevron-right" size={16} className="group-hover:translate-x-1 transition-transform" />
                                                        </button>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                )}

                                {view === 'read' && selectedBlog && (
                                    <div className="max-w-3xl mx-auto fade-in">
                                        <button onClick={() => setView('home')} className="flex items-center gap-2 text-slate-500 hover:text-indigo-600 mb-8 font-medium">
                                            <Icon name="arrow-left" size={18} /> Back
                                        </button>
                                        <article className="bg-white rounded-3xl border border-slate-200 p-8 md:p-12 shadow-sm">
                                            <span className="text-indigo-600 font-bold uppercase tracking-widest text-xs mb-4 block">{selectedBlog.subject}</span>
                                            <h1 className="text-3xl md:text-5xl font-black text-slate-900 mb-6 leading-tight">{selectedBlog.topic}</h1>
                                            <div className="prose prose-slate max-w-none whitespace-pre-wrap text-slate-700 text-lg leading-relaxed mb-8">
                                                {selectedBlog.content}
                                            </div>

                                            {selectedBlog.tableData && selectedBlog.tableData.length > 0 && (
                                                <div className="mt-8 border rounded-xl overflow-hidden">
                                                    <table className="w-full text-left text-sm">
                                                        <thead className="bg-slate-50 border-b">
                                                            <tr>
                                                                <th className="px-4 py-3 font-bold text-slate-700">Key / Header</th>
                                                                <th className="px-4 py-3 font-bold text-slate-700">Value / Description</th>
                                                            </tr>
                                                        </thead>
                                                        <tbody className="divide-y">
                                                            {selectedBlog.tableData.map((row, i) => (
                                                                <tr key={i}>
                                                                    <td className="px-4 py-3 font-medium text-indigo-600 bg-indigo-50/30">{row.key}</td>
                                                                    <td className="px-4 py-3 text-slate-600">{row.value}</td>
                                                                </tr>
                                                            ))}
                                                        </tbody>
                                                    </table>
                                                </div>
                                            )}
                                        </article>
                                    </div>
                                )}

                                {view === 'login' && (
                                    <div className="max-w-md mx-auto mt-12 fade-in">
                                        <div className="bg-white rounded-3xl border border-slate-200 p-8 shadow-xl text-center">
                                            <Icon name="lock" size={32} className="text-indigo-600 mb-6" />
                                            <h2 className="text-2xl font-bold mb-6">Admin Login</h2>
                                            <form onSubmit={handleLogin} className="space-y-4 text-left">
                                                <input type="text" placeholder="ID" className="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-indigo-500 outline-none" value={loginId} onChange={e => setLoginId(e.target.value)} required />
                                                <input type="password" placeholder="Password" className="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-indigo-500 outline-none" value={loginPass} onChange={e => setLoginPass(e.target.value)} required />
                                                {error && <p className="text-red-500 text-sm font-medium">{error}</p>}
                                                <button className="w-full bg-slate-900 text-white font-bold py-3 rounded-xl hover:bg-slate-800 transition-colors">Sign In</button>
                                            </form>
                                        </div>
                                    </div>
                                )}

                                {view === 'admin' && isAdminMode && (
                                    <div className="grid grid-cols-1 lg:grid-cols-3 gap-8 fade-in">
                                        <div className="lg:col-span-1">
                                            <div className="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm sticky top-24">
                                                <h3 className="text-lg font-bold mb-6 text-indigo-600 flex items-center gap-2">
                                                    <Icon name={editingId ? "edit" : "plus-circle"} size={20}/> 
                                                    {editingId ? "Edit Post" : "Publish New"}
                                                </h3>
                                                <form onSubmit={handleSavePost} className="space-y-4">
                                                    <input type="text" placeholder="Subject" className="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none" value={newPost.subject} onChange={e => setNewPost({...newPost, subject: e.target.value})} required />
                                                    <input type="text" placeholder="Topic" className="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none" value={newPost.topic} onChange={e => setNewPost({...newPost, topic: e.target.value})} required />
                                                    <textarea placeholder="Content..." className="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none" rows="6" value={newPost.content} onChange={e => setNewPost({...newPost, content: e.target.value})} required></textarea>
                                                    
                                                    <div className="border-t pt-4">
                                                        <div className="flex items-center justify-between mb-2">
                                                            <span className="text-sm font-bold text-slate-500">Supporting Table</span>
                                                            <button type="button" onClick={handleAddTableRow} className="text-xs bg-indigo-600 text-white px-2 py-1 rounded-md hover:bg-indigo-700">Add Row</button>
                                                        </div>
                                                        <div className="space-y-2 max-h-48 overflow-y-auto pr-1">
                                                            {newPost.tableData?.map((row, i) => (
                                                                <div key={i} className="flex gap-2 items-start">
                                                                    <input placeholder="Key" className="flex-1 px-2 py-1 text-xs border rounded" value={row.key} onChange={e => handleUpdateTableRow(i, 'key', e.target.value)} />
                                                                    <input placeholder="Value" className="flex-1 px-2 py-1 text-xs border rounded" value={row.value} onChange={e => handleUpdateTableRow(i, 'value', e.target.value)} />
                                                                    <button type="button" onClick={() => handleRemoveTableRow(i)} className="text-red-400 hover:text-red-600"><Icon name="x" size={16} /></button>
                                                                </div>
                                                            ))}
                                                        </div>
                                                    </div>

                                                    <div className="flex gap-2">
                                                        <button type="submit" className="flex-grow bg-indigo-600 text-white font-bold py-3 rounded-xl hover:bg-indigo-700 transition-all shadow-md">
                                                            {editingId ? "Update" : "Publish"}
                                                        </button>
                                                        {editingId && (
                                                            <button type="button" onClick={handleCancelEdit} className="px-4 bg-slate-100 text-slate-600 rounded-xl hover:bg-slate-200 font-bold">Cancel</button>
                                                        )}
                                                    </div>
                                                </form>
                                            </div>
                                        </div>
                                        <div className="lg:col-span-2">
                                            <div className="bg-white rounded-2xl border border-slate-200 overflow-hidden shadow-sm">
                                                <div className="p-4 border-b font-bold bg-slate-50 flex items-center justify-between">
                                                    <span>Live Firestore Database</span>
                                                    <span className="text-xs bg-indigo-100 text-indigo-600 px-2 py-1 rounded-full">{blogs.length} Posts</span>
                                                </div>
                                                <div className="divide-y divide-slate-100">
                                                    {blogs.map(b => (
                                                        <div key={b.id} className={`p-4 flex items-center justify-between hover:bg-slate-50 transition-colors ${editingId === b.id ? 'bg-indigo-50' : ''}`}>
                                                            <div className="flex-grow">
                                                                <span className="text-[10px] font-bold bg-indigo-100 text-indigo-700 px-2 py-0.5 rounded uppercase tracking-wider">{b.subject}</span>
                                                                <p className="font-bold text-slate-800">{b.topic}</p>
                                                            </div>
                                                            <div className="flex gap-1">
                                                                <button onClick={() => handleEditClick(b)} className="p-2 text-slate-400 hover:text-indigo-600 transition-colors">
                                                                    <Icon name="edit" size={18} />
                                                                </button>
                                                                <button onClick={() => handleDeletePost(b.id)} className="p-2 text-slate-400 hover:text-red-500 transition-colors">
                                                                    <Icon name="trash-2" size={18} />
                                                                </button>
                                                            </div>
                                                        </div>
                                                    ))}
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                )}
                            </>
                        )}
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
