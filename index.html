<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asiqur's Blog | Exam-3 Preps</title>
    <!-- React and Babel -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Firebase SDKs (Using Compat version for easier single-script integration) -->
    <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .line-clamp-3 { display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
        .fade-in { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect } = React;

        /**
         * IMPORTANT FOR VERCEL DEPLOYMENT:
         * Paste your Firebase config from the Firebase Console below.
         */
        const firebaseConfig = {
    apiKey: "AIzaSyCtySdj26DJT5Tb1Bv7LChYVnfU5hFe3Yg",
    authDomain: "prepforexam-7e365.firebaseapp.com",
    projectId: "prepforexam-7e365",
    storageBucket: "prepforexam-7e365.firebasestorage.app",
    messagingSenderId: "741904591926",
    appId: "1:741904591926:web:d7e799828b4d7500cbbc97",
    measurementId: "G-51D15N6Q7D"
  };


        // --- Firebase Initialization Logic ---
        let db, auth, appId;
        let isFirebaseReady = false;

        try {
            let config = {};
            if (typeof __firebase_config !== 'undefined' && __firebase_config) {
                config = JSON.parse(__firebase_config);
            } else if (MANUAL_CONFIG.apiKey) {
                config = MANUAL_CONFIG;
            }

            if (config.apiKey && typeof firebase !== 'undefined') {
                if (!firebase.apps.length) {
                    firebase.initializeApp(config);
                }
                db = firebase.firestore();
                auth = firebase.auth();
                appId = typeof __app_id !== 'undefined' ? __app_id : 'asiqur-blog';
                isFirebaseReady = true;
            }
        } catch (e) {
            console.error("Critical Firebase Init Error:", e);
        }

        const Icon = ({ name, size = 20, className = "" }) => {
            useEffect(() => { if (window.lucide) window.lucide.createIcons(); }, [name]);
            return <i data-lucide={name} style={{ width: size, height: size }} className={`inline-block ${className}`}></i>;
        };

        const ADMIN_ID = "Admin789";
        const ADMIN_PASS = "Admin987#";

        function App() {
            const [view, setView] = useState('home');
            const [blogs, setBlogs] = useState([]);
            const [user, setUser] = useState(null);
            const [isLoading, setIsLoading] = useState(true);
            const [loadError, setLoadError] = useState(null);
            const [selectedBlog, setSelectedBlog] = useState(null);
            const [selectedSubject, setSelectedSubject] = useState('All');
            const [isAdminMode, setIsAdminMode] = useState(false);
            
            const [loginId, setLoginId] = useState('');
            const [loginPass, setLoginPass] = useState('');
            const [error, setError] = useState('');
            const [newPost, setNewPost] = useState({ subject: '', topic: '', content: '' });

            // Initialize Auth
            useEffect(() => {
                if (!isFirebaseReady) {
                    setIsLoading(false);
                    return;
                }

                const initAuth = async () => {
                    try {
                        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                            await auth.signInWithCustomToken(__initial_auth_token);
                        } else if (!auth.currentUser) {
                            await auth.signInAnonymously();
                        }
                    } catch (err) {
                        console.error("Auth Error:", err);
                        setLoadError("Authentication failed. Please check your Firebase settings.");
                        setIsLoading(false);
                    }
                };
                initAuth();
                const unsubscribe = auth.onAuthStateChanged((u) => setUser(u));
                return () => unsubscribe();
            }, []);

            // Real-time Data Sync
            useEffect(() => {
                if (!user || !isFirebaseReady) return;
                
                setIsLoading(true);
                // Path following Rule 1 strictly
                const collectionRef = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('blogs');
                
                const unsubscribe = collectionRef.onSnapshot((snapshot) => {
                    const data = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    data.sort((a, b) => (b.createdAt || 0) - (a.createdAt || 0));
                    setBlogs(data);
                    setIsLoading(false);
                    setLoadError(null);
                }, (err) => {
                    console.error("Firestore Error:", err);
                    setLoadError(err.message.includes('permission') ? 
                        "Permission Denied. Please enable 'Test Mode' in your Firestore Rules." : 
                        "Failed to connect to database.");
                    setIsLoading(false);
                });

                return () => unsubscribe();
            }, [user]);

            const subjects = useMemo(() => ['All', ...new Set(blogs.map(b => b.subject))], [blogs]);
            const filteredBlogs = useMemo(() => selectedSubject === 'All' ? blogs : blogs.filter(b => b.subject === selectedSubject), [blogs, selectedSubject]);

            const handleLogin = (e) => {
                e.preventDefault();
                if (loginId === ADMIN_ID && loginPass === ADMIN_PASS) {
                    setIsAdminMode(true);
                    setView('admin');
                    setError('');
                } else {
                    setError('Invalid Credentials');
                }
            };

            const handleCreatePost = async (e) => {
                e.preventDefault();
                if (!newPost.subject || !newPost.topic || !newPost.content || !isFirebaseReady || !user) return;

                const postData = {
                    ...newPost,
                    author: "Asiqur",
                    date: new Date().toLocaleDateString(),
                    createdAt: Date.now()
                };

                try {
                    const collectionRef = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('blogs');
                    await collectionRef.add(postData);
                    setNewPost({ subject: '', topic: '', content: '' });
                    setView('admin');
                } catch (err) {
                    console.error("Post failed", err);
                    alert("Failed to publish: " + err.message);
                }
            };

            const handleDeletePost = async (id) => {
                if (confirm('Delete this prep guide?') && isFirebaseReady) {
                    try {
                        const collectionRef = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('blogs');
                        await collectionRef.doc(id).delete();
                    } catch (err) {
                        console.error("Delete failed", err);
                    }
                }
            };

            // Setup instruction view
            if (!isFirebaseReady && !isLoading) {
                return (
                    <div className="min-h-screen flex items-center justify-center bg-slate-50 p-4">
                        <div className="bg-white p-8 rounded-2xl shadow-xl max-w-md text-center">
                            <div className="w-16 h-16 bg-amber-50 text-amber-500 rounded-full flex items-center justify-center mx-auto mb-4">
                                <Icon name="alert-triangle" size={32} />
                            </div>
                            <h1 className="text-xl font-bold mb-2">Connect Firebase</h1>
                            <p className="text-slate-600 mb-6">You need to add your credentials to the <code>MANUAL_CONFIG</code> object at the top of the file to use this on Vercel.</p>
                            <div className="text-left bg-slate-900 text-indigo-300 p-4 rounded-lg text-xs overflow-auto font-mono">
                                1. Go to Firebase Console<br/>
                                2. Copy Project Config<br/>
                                3. Paste into MANUAL_CONFIG
                            </div>
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen pb-20">
                    <nav className="bg-white border-b border-slate-200 sticky top-0 z-50 shadow-sm">
                        <div className="max-w-6xl mx-auto px-4 h-16 flex items-center justify-between">
                            <div className="flex items-center gap-2 cursor-pointer group" onClick={() => setView('home')}>
                                <div className="bg-indigo-600 p-2 rounded-lg text-white flex items-center justify-center">
                                    <Icon name="book-open" size={20} />
                                </div>
                                <span className="text-xl font-bold text-slate-800 tracking-tight">Asiqur's<span className="text-indigo-600">Blog</span></span>
                            </div>
                            <div>
                                {isAdminMode ? (
                                    <button onClick={() => { setIsAdminMode(false); setView('home'); }} className="text-sm font-medium text-red-600 px-3 py-2 flex items-center gap-1">
                                        <Icon name="log-out" size={16} /> Exit Admin
                                    </button>
                                ) : (
                                    <button onClick={() => setView('login')} className="text-sm font-medium text-slate-600 hover:text-indigo-600 flex items-center gap-1">
                                        <Icon name="shield-check" size={16} /> Admin
                                    </button>
                                )}
                            </div>
                        </div>
                    </nav>

                    <main className="max-w-6xl mx-auto px-4 py-8">
                        {isLoading ? (
                            <div className="flex flex-col items-center justify-center py-20">
                                <div className="w-12 h-12 border-4 border-indigo-600 border-t-transparent rounded-full animate-spin"></div>
                                <p className="mt-4 text-slate-400 font-medium">Syncing with cloud...</p>
                                <p className="text-xs text-slate-300 mt-2">Checking authentication & data rules</p>
                            </div>
                        ) : loadError ? (
                            <div className="max-w-md mx-auto text-center py-20">
                                <div className="bg-red-50 text-red-600 p-6 rounded-2xl border border-red-100">
                                    <Icon name="cloud-off" size={40} className="mb-4" />
                                    <h2 className="text-lg font-bold mb-2">Sync Error</h2>
                                    <p className="text-sm opacity-90 mb-4">{loadError}</p>
                                    <button onClick={() => window.location.reload()} className="px-4 py-2 bg-red-600 text-white rounded-lg text-sm font-bold">Retry Connection</button>
                                </div>
                            </div>
                        ) : (
                            <>
                                {view === 'home' && (
                                    <div className="space-y-8 fade-in">
                                        <header className="text-center max-w-2xl mx-auto space-y-4">
                                            <h1 className="text-4xl font-extrabold text-slate-900 tracking-tight">Exam-3 Preps</h1>
                                            <p className="text-slate-500 text-lg font-medium">Cloud Database Connected</p>
                                        </header>
                                        
                                        {blogs.length > 0 && (
                                            <div className="flex flex-wrap gap-2 justify-center">
                                                {subjects.map(sub => (
                                                    <button key={sub} onClick={() => setSelectedSubject(sub)} className={`px-4 py-2 rounded-full text-sm font-medium transition-all ${selectedSubject === sub ? 'bg-indigo-600 text-white shadow-md' : 'bg-white text-slate-600 border border-slate-200 hover:bg-slate-50'}`}>
                                                        {sub}
                                                    </button>
                                                ))}
                                            </div>
                                        )}

                                        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                                            {filteredBlogs.map(blog => (
                                                <div key={blog.id} className="bg-white rounded-2xl border border-slate-200 overflow-hidden hover:shadow-xl transition-all flex flex-col h-full">
                                                    <div className="p-6 flex-grow">
                                                        <span className="inline-block px-3 py-1 bg-indigo-50 text-indigo-700 text-xs font-bold rounded mb-4 uppercase tracking-wider">{blog.subject}</span>
                                                        <h3 className="text-xl font-bold text-slate-800 mb-3 line-clamp-2">{blog.topic}</h3>
                                                        <p className="text-slate-600 text-sm leading-relaxed line-clamp-3">{blog.content}</p>
                                                    </div>
                                                    <div className="px-6 py-4 bg-slate-50 border-t border-slate-100 flex items-center justify-between">
                                                        <span className="text-xs text-slate-400 flex items-center gap-1"><Icon name="calendar" size={14} /> {blog.date}</span>
                                                        <button onClick={() => { setSelectedBlog(blog); setView('read'); }} className="text-indigo-600 text-sm font-bold flex items-center gap-1 hover:underline group">
                                                            Read More <Icon name="chevron-right" size={16} className="group-hover:translate-x-1 transition-transform" />
                                                        </button>
                                                    </div>
                                                </div>
                                            ))}
                                            {filteredBlogs.length === 0 && (
                                                <div className="col-span-full py-20 text-center bg-white rounded-3xl border border-dashed border-slate-300">
                                                    <Icon name="clipboard-list" size={48} className="mx-auto text-slate-300 mb-4" />
                                                    <p className="text-slate-500 font-medium text-lg">No posts in the database yet.</p>
                                                </div>
                                            )}
                                        </div>
                                    </div>
                                )}

                                {view === 'read' && selectedBlog && (
                                    <div className="max-w-3xl mx-auto fade-in">
                                        <button onClick={() => setView('home')} className="flex items-center gap-2 text-slate-500 hover:text-indigo-600 mb-8 font-medium">
                                            <Icon name="arrow-left" size={18} /> Back
                                        </button>
                                        <article className="bg-white rounded-3xl border border-slate-200 p-8 md:p-12 shadow-sm">
                                            <span className="text-indigo-600 font-bold uppercase tracking-widest text-xs mb-4 block">{selectedBlog.subject}</span>
                                            <h1 className="text-3xl md:text-5xl font-black text-slate-900 mb-6 leading-tight">{selectedBlog.topic}</h1>
                                            <div className="prose prose-slate max-w-none whitespace-pre-wrap text-slate-700 text-lg leading-relaxed">
                                                {selectedBlog.content}
                                            </div>
                                        </article>
                                    </div>
                                )}

                                {view === 'login' && (
                                    <div className="max-w-md mx-auto mt-12 fade-in">
                                        <div className="bg-white rounded-3xl border border-slate-200 p-8 shadow-xl text-center">
                                            <div className="w-16 h-16 bg-indigo-50 text-indigo-600 rounded-2xl flex items-center justify-center mx-auto mb-6">
                                                <Icon name="lock" size={32} />
                                            </div>
                                            <h2 className="text-2xl font-bold mb-6">Admin Login</h2>
                                            <form onSubmit={handleLogin} className="space-y-4 text-left">
                                                <input type="text" placeholder="ID" className="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-indigo-500 outline-none" value={loginId} onChange={e => setLoginId(e.target.value)} required />
                                                <input type="password" placeholder="Password" className="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-indigo-500 outline-none" value={loginPass} onChange={e => setLoginPass(e.target.value)} required />
                                                {error && <p className="text-red-500 text-sm font-medium">{error}</p>}
                                                <button className="w-full bg-slate-900 text-white font-bold py-3 rounded-xl hover:bg-slate-800 transition-colors">Sign In</button>
                                            </form>
                                        </div>
                                    </div>
                                )}

                                {view === 'admin' && isAdminMode && (
                                    <div className="grid grid-cols-1 lg:grid-cols-3 gap-8 fade-in">
                                        <div className="lg:col-span-1">
                                            <div className="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm sticky top-24">
                                                <h3 className="text-lg font-bold mb-6 text-indigo-600 flex items-center gap-2"><Icon name="plus-circle" size={20}/> Publish New</h3>
                                                <form onSubmit={handleCreatePost} className="space-y-4">
                                                    <input type="text" placeholder="Subject (e.g. Physics)" className="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none" value={newPost.subject} onChange={e => setNewPost({...newPost, subject: e.target.value})} required />
                                                    <input type="text" placeholder="Topic (e.g. Waves)" className="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none" value={newPost.topic} onChange={e => setNewPost({...newPost, topic: e.target.value})} required />
                                                    <textarea placeholder="Content..." className="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none" rows="8" value={newPost.content} onChange={e => setNewPost({...newPost, content: e.target.value})} required></textarea>
                                                    <button className="w-full bg-indigo-600 text-white font-bold py-3 rounded-xl hover:bg-indigo-700 transition-all shadow-md">Publish to Firestore</button>
                                                </form>
                                            </div>
                                        </div>
                                        <div className="lg:col-span-2">
                                            <div className="bg-white rounded-2xl border border-slate-200 overflow-hidden shadow-sm">
                                                <div className="p-4 border-b font-bold bg-slate-50 flex items-center justify-between">
                                                    <span>Live Firestore Database</span>
                                                    <span className="text-xs bg-indigo-100 text-indigo-600 px-2 py-1 rounded-full">{blogs.length} Posts</span>
                                                </div>
                                                <div className="divide-y divide-slate-100">
                                                    {blogs.map(b => (
                                                        <div key={b.id} className="p-4 flex items-center justify-between hover:bg-slate-50 transition-colors">
                                                            <div>
                                                                <span className="text-[10px] font-bold bg-indigo-100 text-indigo-700 px-2 py-0.5 rounded uppercase tracking-wider">{b.subject}</span>
                                                                <p className="font-bold text-slate-800">{b.topic}</p>
                                                            </div>
                                                            <button onClick={() => handleDeletePost(b.id)} className="p-2 text-slate-400 hover:text-red-500 transition-colors">
                                                                <Icon name="trash-2" size={18} />
                                                            </button>
                                                        </div>
                                                    ))}
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                )}
                            </>
                        )}
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
